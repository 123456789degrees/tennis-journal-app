<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎾</text></svg>">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{{ '/' | relative_url }}">🎾 MatchMind</a>
      <nav>
        {% for item in site.nav_pages %}
          <a href="{{ item.path | relative_url }}" {% if page.url == item.path %}class="active"{% endif %}>{{ item.title }}</a>
        {% endfor %}
      </nav>
    </div>
  </header>

  <main class="wrap page">
    {% if page.title and page.hide_title != true %}
      <h1 class="page-title">{{ page.title }}</h1>
    {% endif %}
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>MatchMind — built through the UA Framework (Discovery → Analysis → Specification). <a href="https://github.com/{{ site.repository | default: '123456789degrees/tennis-journal-app' }}">View source on GitHub</a>.</p>
    </div>
  </footer>
</body>
</html>
