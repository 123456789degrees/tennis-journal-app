<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MatchMind — Wireframes</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#fdf8ec; --ink:#2b2b2b; }
  body{ background:#efe8d6; color:var(--ink); font-family:'Patrick Hand','Comic Sans MS',cursive; margin:0; padding:24px; display:flex; flex-direction:column; align-items:center; }
  h1{ font-size:22px; margin:0 0 4px; }
  .sub{ opacity:0.6; font-size:14px; margin-bottom:18px; }
  .phone{ width:360px; background:var(--paper); border:2.5px solid var(--ink); border-radius:26px; padding:18px; box-shadow:4px 5px 0 rgba(0,0,0,0.15); min-height:520px; }
  .label{ font-size:12px; letter-spacing:2px; text-transform:uppercase; opacity:0.5; }
  h2{ font-size:20px; margin:6px 0; }
  h3{ font-size:16px; margin:14px 0 6px; }
  .btn{ display:inline-block; border:2px solid var(--ink); border-radius:10px; padding:7px 14px; margin:4px 6px 4px 0; cursor:pointer; font-size:15px; background:var(--paper); }
  .btn.primary{ background:var(--ink); color:var(--paper); }
  .big{ display:block; text-align:center; font-size:19px; padding:14px; border:2px dashed var(--ink); border-radius:12px; margin:12px 0; cursor:pointer; }
  .card{ border:2px solid var(--ink); border-radius:12px; padding:12px; margin:10px 0; }
  .card.hi{ background:#fffdf5; }
  .dash{ border:1.5px dashed var(--ink); border-radius:10px; padding:8px 10px; }
  .fld{ border:1.5px solid var(--ink); border-radius:8px; padding:7px; margin:3px 0; font-size:14px; opacity:0.65; }
  .row{ display:flex; gap:8px; }
  .row>*{ flex:1; }
  .note{ margin-top:16px; padding-top:10px; border-top:1.5px dashed var(--ink); font-size:12.5px; opacity:0.7; }
  .top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .link{ cursor:pointer; text-decoration:underline; }
  a{ color:var(--ink); }
  p{ line-height:1.6; }
  .hidden{ display:none; }
  .mut{ font-size:13px; opacity:0.6; }
</style>
</head>
<body>
<h1>MatchMind — Wireframes</h1>
<div class="sub">Hand-drawn on purpose. Click any button to move between screens.</div>
<div class="phone" id="phone"></div>

<script>
const S = {
  inventory:`<div class="label">Screen Inventory</div><h2>MatchMind</h2>
    <p class="mut">Tap a screen to open it.</p>
    <div class="dash">
    <p class="link" data-go="login">1 · Login / Account setup</p>
    <p class="link" data-go="home">2 · Home / Dashboard</p>
    <p class="link" data-go="log">3 · Log Match (Quick Capture)</p>
    <p class="link" data-go="selectopp">4 · Select / Add Opponent</p>
    <p class="link" data-go="opp">5 · Opponent Detail (Scouting)</p>
    <p class="link" data-go="history">6 · Match History</p>
    <p class="link" data-go="match">7 · Match Detail</p>
    <p class="link" data-go="practice">8 · Practice / Insights</p>
    <p class="link" data-go="settings">9 · Settings</p>
    <p class="link" data-go="empty">10 · Empty state (first run)</p>
    <p class="link" data-go="error">11 · Error / offline</p>
    <p class="link" data-go="saved">12 · Save confirmation</p>
    </div>`,

  login:`<div class="top"><div class="label">Screen 1 · Login</div><span class="link" data-go="inventory">☰ screens</span></div>
    <div class="card"><h3 style="margin-top:0">MatchMind</h3>
    <div class="fld">you@email.com</div><div class="fld">password ••••••</div>
    <p class="mut">Under 13? We'll ask for a parent's email.</p><div class="fld">parent email (if under 13)</div>
    <div class="btn primary" data-go="home">Sign in</div><div class="btn" data-go="home">Create account</div></div>`,

  home:`<div class="top"><div class="label">Screen 2 · Home</div><span class="link" data-go="inventory">☰ screens</span></div>
    <div class="big" data-go="log">+ Log a match</div>
    <div class="card hi"><b>⚡ Practice nudge</b><p style="margin:6px 0">Backhand attacked in 3 of your last 5.</p><span class="btn" data-go="practice">See drill →</span></div>
    <h3>Recent matches</h3>
    <div class="dash"><p class="link" data-go="match">vs. Wylan — L 4-6, 3-6 · Jun 3</p><p class="link" data-go="match">vs. Daren — W 6-2, 6-4 · May 28</p><p class="link" data-go="match">vs. Alex P. — L 5-7, 6-7 · May 14</p></div>
    <div style="margin-top:10px"><span class="btn" data-go="selectopp">Opponents</span><span class="btn" data-go="history">All matches</span><span class="btn" data-go="settings">Settings</span></div>`,

  log:`<div class="top"><div class="label">Screen 3 · Log Match</div><span class="link" data-go="inventory">☰ screens</span></div>
    <p class="mut">every box: type or 🎤 dictate</p>
    <div class="card"><b>Opponent</b><div class="fld link" data-go="selectopp">Search or add opponent…</div>
    <b>Score</b><div class="row"><div class="fld">6-4</div><div class="fld">3-6</div><div class="fld">Set 3</div></div>
    <p style="margin:6px 0">◯ Win &nbsp; ⬤ Loss</p>
    <b>Playstyle</b><div class="fld">Pusher / moonballer ▾</div></div>
    <div class="card"><b>Scout your opponent</b>
    <p style="margin:4px 0">FH<div class="fld">strong but not consistent</div></p>
    <p style="margin:4px 0">Serve<div class="fld">big serve, lots of kick</div></p>
    <p style="margin:4px 0">BH<div class="fld">weak, just makes it back</div></p>
    <p style="margin:4px 0">Other<div class="fld">&nbsp;</div></p></div>
    <div class="card hi"><b>Your game this match</b>
    <p style="margin:4px 0">✅ What I did well<div class="fld">forehand was on</div></p>
    <p style="margin:4px 0">📈 What to improve<div class="fld">backhand, 2nd serve</div></p>
    <p class="mut">→ feeds your practice tips</p></div>
    <div class="btn primary" data-go="saved">Save</div>`,

  selectopp:`<div class="top"><div class="label">Screen 4 · Select / Add Opponent</div><span class="link" data-go="inventory">☰ screens</span></div>
    <div class="fld">Search opponent (fuzzy — spelling/nicknames ok)…</div>
    <h3>Your opponents</h3>
    <div class="dash"><p class="link" data-go="opp">Wylan — 1W 2L · Aggressive baseliner</p><p class="link" data-go="opp">Daren — 2W 1L · Counterpuncher</p><p class="link" data-go="opp">Alex P. — 0W 2L · Pusher</p></div>
    <div class="btn primary" data-go="opp">+ Add new opponent</div>`,

  opp:`<div class="top"><div class="label">Screen 5 · Opponent Detail</div><span class="link" data-go="inventory">☰ screens</span></div>
    <h2>Wylan</h2><p>Aggressive baseliner · H2H: <b>1W – 2L</b></p>
    <p class="mut">scouting profile — type or 🎤 dictate</p>
    <div class="dash" style="margin-bottom:5px"><b>Forehand:</b> strong but not consistent</div>
    <div class="dash" style="margin-bottom:5px"><b>Serve:</b> big serve, fast with kick</div>
    <div class="dash" style="margin-bottom:5px"><b>Backhand:</b> weak, just makes it back</div>
    <div class="dash" style="margin-bottom:8px"><b>Other:</b> gets tired in 3rd set</div>
    <div class="card hi"><b>🤖 How to beat them</b><p style="margin:6px 0">Attack the backhand early, stay patient in rallies, return the kick serve from deeper.</p></div>
    <h3>Your matches vs. Wylan</h3>
    <div class="dash"><p class="link" data-go="match">L 4-6, 3-6 · Jun 3, 2026</p><p class="link" data-go="match">W 6-3, 7-5 · Apr 20, 2026</p><p class="link" data-go="match">L 2-6, 4-6 · Nov 8, 2025</p></div>
    <div class="btn primary" data-go="log" style="margin-top:10px">Log a match vs. Wylan</div>`,

  history:`<div class="top"><div class="label">Screen 6 · Match History</div><span class="link" data-go="inventory">☰ screens</span></div>
    <div class="fld">Filter by opponent…</div>
    <div class="dash" style="margin-top:10px"><p class="link" data-go="match">vs. Wylan — L 4-6, 3-6 · Jun 3</p><p class="link" data-go="match">vs. Daren — W 6-2, 6-4 · May 28</p><p class="link" data-go="match">vs. Alex P. — L 5-7, 6-7 · May 14</p><p class="link" data-go="match">vs. Wylan — W 6-3, 7-5 · Apr 20</p></div>`,

  match:`<div class="top"><div class="label">Screen 7 · Match Detail</div><span class="link" data-go="inventory">☰ screens</span></div>
    <div class="card"><h3 style="margin-top:0">vs. <span class="link" data-go="opp">Wylan</span></h3>
    <p>Result: <b>Loss</b> — 4-6, 3-6 · Jun 3</p><p>Playstyle: Aggressive baseliner</p>
    <b>Match notes</b> <span class="mut">(type or 🎤 dictate)</span><div class="fld">Add notes now or later…</div></div>
    <span class="btn" data-go="opp">View opponent</span><span class="btn" data-go="history">Delete match</span>`,

  practice:`<div class="top"><div class="label">Screen 8 · Practice / Insights</div><span class="link" data-go="inventory">☰ screens</span></div>
    <p class="mut">surfaces on its own from your matches</p>
    <div class="card hi"><b>🤖 Your backhand got attacked in 3 of your last 5.</b><p style="margin:6px 0">Drill: cross-court backhand (20 in a row), then inside-out forehand to run around it.</p><span class="btn">Open drill</span><span class="btn">Not quite →</span></div>
    <div class="card"><b>"Not quite" — the real issue?</b><p style="margin:6px 0">◯ My backhand stroke<br>◯ My footwork / movement<br>◯ Shot selection</p><p class="mut">corrects this tip + trains future ones</p></div>`,

  settings:`<div class="top"><div class="label">Screen 9 · Settings</div><span class="link" data-go="inventory">☰ screens</span></div>
    <div class="card"><p><b>Account:</b> joshua@email.com</p><p><b>Parent on account</b> (under-13)</p><hr>
    <p>☑ Practice nudges<br>☑ Reminder to log after a match</p><hr>
    <p class="mut">🔒 Your data is private and personal — only you can see your matches and opponent notes.</p></div>
    <div class="btn" data-go="login">Sign out</div>`,

  empty:`<div class="top"><div class="label">Screen 10 · Empty state</div><span class="link" data-go="inventory">☰ screens</span></div>
    <div class="card" style="text-align:center"><h3>Welcome to MatchMind 🎾</h3><p>No matches yet. Log your first — about 15 seconds.</p><div class="btn primary" data-go="log">+ Log your first match</div></div>
    <p class="mut">Opponents and practice tips appear here as you log matches.</p>`,

  error:`<div class="top"><div class="label">Screen 11 · Error / offline</div><span class="link" data-go="inventory">☰ screens</span></div>
    <div class="card" style="background:#fff6f6"><h3>Couldn't save — you're offline</h3><p>Everything you entered is still here. We'll try again.</p><div class="btn primary" data-go="saved">Retry</div><div class="btn" data-go="log">Keep editing</div></div>`,

  saved:`<div class="top"><div class="label">Screen 12 · Save confirmation</div><span class="link" data-go="inventory">☰ screens</span></div>
    <div class="card" style="text-align:center"><h2>✓ Match saved</h2><p>Nice — it's in. Add more detail anytime.</p><div class="btn primary" data-go="home">Done</div><div class="btn" data-go="match">View match</div></div>`,
};

function show(id){ document.getElementById('phone').innerHTML = S[id] || S.inventory; window.scrollTo(0,0); }
document.addEventListener('click', function(e){ var g = e.target.closest('[data-go]'); if(g){ show(g.getAttribute('data-go')); } });
show('home');
</script>
</body>
</html>
